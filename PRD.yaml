    - title: "Evaluation harness metrics"
      completed: false
      description: |
          Create test/eval.ts implementing the evaluation harness that
          validates the extractor against the hand-curated fixture corpus.

          Read: DESIGN.md §13 (Evaluation harness), specifically §13.2 (metrics)
          and §13.3 (curation workflow).

          NOTE: The fixtures in test/fixtures/corpus/ are hand-curated BEFORE
          ralphy runs. Do NOT attempt to create or modify any .html or
          .expected.json files in that directory — they are in the never_touch
          boundary. Your job is to build the metrics harness that reads them.

          Fixture schema (each .expected.json at test/fixtures/corpus/<archetype>/<name>.expected.json):
          {
            "fixture_version": "1.0",
            "source_url": "https://...",
            "archetype": "article-blog" | "docs" | "news",
            "expected": {
              "title": string,                    // exact expected title
              "strategy": "explicit" | "selector" | "heuristic",
              "selector": string | null,          // selector chain match, or null for heuristic/explicit
              "confidence": "high" | "medium" | "low",
              "word_count_range": [min: number, max: number],
              "must_contain": string[],           // phrases that MUST appear in extracted content.markdown
              "must_not_contain": string[]        // phrases that MUST NOT appear (nav/footer leakage indicators)
            },
            "notes": string                       // human-readable curator notes (ignore in tests)
          }

          The fixture <name>.html lives alongside <name>.expected.json.

          Requirements for test/eval.ts:
          - Discover every fixture pair by scanning
            test/fixtures/corpus/<archetype>/*.html and reading the sibling
            *.expected.json
          - For each fixture:
            1. Read the HTML from disk
            2. Run the extract pipeline on the HTML directly (no network) —
               create a helper that accepts raw HTML + a synthetic url, so
               fixtures can be tested offline
            3. Compare the result to `expected`:
               - title matches exactly
               - extraction.strategy matches exactly
               - extraction.selector matches exactly
               - extraction.confidence matches exactly
               - word_count falls within word_count_range
               - Every phrase in must_contain appears in content.markdown
               - No phrase in must_not_contain appears in content.markdown
            4. Additionally compute quality metrics:
               - Word-level precision/recall/f1 between extracted content
                 (tokenized by whitespace) and the concatenation of the
                 must_contain phrases (as a rough ground-truth bag)
               - Structural diff: does the extracted markdown contain
                 headings (^# ), lists (^- |^\\d+\\. ), code blocks (```),
                 images (!\\[) when the fixture implies they should?
          - Aggregate across fixtures: macro-averaged f1, per-archetype
