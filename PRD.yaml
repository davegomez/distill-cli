          - A unit test verifies the word-level metrics against a synthetic
            in-memory fixture (NOT added to the corpus directory)
          - `pnpm check` passes

          If the extractor fails to pass some fixtures on first implementation,
          that is expected. Log the failing fixtures to CONFLICTS.md with a
          note about which checks failed, and continue — this is useful data
          for the user to review after the run.

