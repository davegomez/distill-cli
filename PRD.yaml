# distill-cli — PRD for ralphy autonomous loop
#
# Run with:
#   ralphy --yaml PRD.yaml --model opus --max-iterations 100
#
# See DESIGN.md for the full specification. See .ralphy/config.yaml for rules.
# Any conflict the agent encounters should be logged to CONFLICTS.md at the
# repo root (the agent continues without stopping the loop).

tasks:
    # =========================================================================
    # Phase 1 — Skeleton and schemas (the foundation)
    # =========================================================================

    - title: "Project skeleton"
      completed: false
      description: |
          Create the initial project structure per DESIGN.md §16 (Tooling and
          conventions) and §17 (Repo layout).

          Read: DESIGN.md §16 and §17.

          Create these files (all at latest versions — see rules):
          - package.json (name: distill-cli, version: 0.1.0, type: module,
            license: AGPL-3.0-or-later, engines.node: ">=24",
            bin: { distill: "./bin/distill" }, imports: { "#/*": "./src/*" },
            pnpm.onlyBuiltDependencies allowlist per §16.1)
          - tsconfig.json per §16.2 (NodeNext module resolution, ES2023 lib
            only, strict + the extra checks listed, #/* path alias)
          - biome.json per §16.3 (exact formatter/linter config shown)
          - vitest.config.ts per §16.4 (environment: 'node', include patterns,
            tsconfigPaths plugin)
          - lefthook.yml per §16.5 (biome + type-check on pre-commit)
          - .nvmrc containing the literal string "lts/*"
          - .gitignore covering: node_modules/, dist/, .env, .env.*, .DS_Store,
            *.log, pnpm-debug.log, .ralphy-worktrees/, .ralphy-sandboxes/,
            test-results/, playwright-report/, local.db, CONFLICTS.md
          - LICENSE — fetch the canonical AGPL-3.0-or-later text (do not
            improvise)
          - bin/distill — placeholder shebang script `#!/usr/bin/env node`
            that imports dist/cli.js (will be populated later)
          - src/cli.ts — empty stub that exits 0
          - test/setup.ts — empty file for Vitest setup

          Install runtime and dev dependencies via `pnpm add`:
          - Runtime: zod, linkedom, file-type, is-svg, playwright
          - Dev: typescript, @biomejs/biome, vitest, vite-tsconfig-paths,
            lefthook, @types/node, tsx

          Add pnpm scripts to package.json per §16.7 (check, type-check, lint,
          lint:fix, format, format:check, test, test:watch, test:e2e, build,
          eval, eval:compare).

          Run `pnpm install` and `pnpm lefthook install` to activate hooks.

          Acceptance:
          - `pnpm install` completes without errors
          - `pnpm type-check` passes (no source files to check yet is fine)
          - `pnpm test` runs (zero tests found is acceptable at this stage)
          - `pnpm biome check .` passes
          - Directory structure matches DESIGN.md §17

    - title: "Zod error schema and error code catalog"
      completed: false
      description: |
          Create src/schema/errors.ts defining the ValidationError /
          DistillError class hierarchy and the full error code catalog.

          Read: DESIGN.md §10 (Exit codes and error codes), §4.4 (error shape).

          Requirements:
          - Export a TypeScript enum or const union `ErrorCode` listing every
            code from §10.2 (all 25 codes across the 5 exit code categories)
          - Export a `DistillError` class with fields: code (ErrorCode),
            message (string), hint (string | undefined),
            retryable (boolean), retry_with (string[]),
            received (unknown, optional), exit_code (0-5)
          - Export a `DistillErrorSchema` Zod schema matching the JSON error
            shape from §4.4 (for output serialization)
          - Export helper constructors for common error classes (e.g.,
            `invalidUrl(url, hint)`, `botBlocked(status, hint)`) that set
            retryable and retry_with correctly per §10.2 and DESIGN.md §4.4
          - Every error code maps to its correct exit code per §10.1
          - Export a mapping `ERROR_CODE_EXIT_CODES` from ErrorCode to exit
            code number

          Acceptance:
          - Unit tests in src/schema/errors.test.ts cover:
            - Every ErrorCode has a defined exit code mapping
            - DistillError serializes to the schema shape from §4.4
            - Helper constructors set retryable/retry_with correctly for
              representative codes (BOT_BLOCKED, TIMEOUT, INVALID_URL)
            - The retryable:true codes are the strict transient set per §4.4
          - `pnpm test src/schema/errors.test.ts` passes
          - `pnpm check` passes

    - title: "Zod input schema"
      completed: false
      description: |
          Create src/schema/input.ts defining the canonical ExtractInput Zod
          schema.

          Read: DESIGN.md §3 (Input contract), §3.2 (flag list), §5 (Actions
          DSL), §11 (schema introspection generated from Zod).

          Requirements:
          - Export `ExtractInputSchema` covering every field from §3.2. Each
            flag listed in §3.2 must have a corresponding field in the schema
            with the correct type and default
          - Export `ActionSchema` as a discriminated union on `type`, covering
            every action from §5.1 (wait, click, scroll, fill, press, dismiss)
            with the correct required/optional fields per §5.2
          - Every enum-valued field (format, scroll target, wait target,
            download-images-format) must reject invalid values
          - The schema is strict — unknown keys are rejected
          - Export a `resolveInput` function that merges parsed JSON input with
            individual flag values, applying the precedence from §3.1 (positional
            URL wins, then flags, then JSON)
          - Export a JSON Schema document derived from ExtractInputSchema via
            `zod-to-json-schema` (install that package) for the --help --json
            introspection consumer

          Acceptance:
          - Unit tests in src/schema/input.test.ts cover:
            - Valid minimal input (just url)
            - Valid full input with every field set
            - Rejects unknown fields
            - Every enum field rejects invalid values
            - ActionSchema validates each action type from §5.1
            - ActionSchema rejects actions specifying neither selector nor
              role+name (per §5.2 targeting rule)
            - resolveInput applies precedence correctly
          - `pnpm test src/schema/input.test.ts` passes
          - `pnpm check` passes

    - title: "Zod output schema"
      completed: false
      description: |
          Create src/schema/output.ts defining the ExtractOutput Zod schema.

          Read: DESIGN.md §4 (Output contract), §4.1 (minimal default),
          §4.2 (field groups), §4.3 (block representation — internal only),
          §4.4 (error shape).

          Requirements:
          - Export `ExtractOutputSchema` matching the minimal default shape
            from §4.1: _meta, url, final_url, title, content.markdown,
            word_count, extraction.{strategy, selector, confidence, archetype},
            warnings
          - Export optional field group schemas that can be composed on top:
            MetaGroupSchema (description, author, published, language,
            site_name), LinksGroupSchema, ImagesGroupSchema,
            ContentHtmlSchema, ContentTextSchema, ExtractionMetricsSchema,
            ExtractionTraceSchema, ActionsTraceSchema
          - Export an enum for extraction.strategy ("explicit" | "selector" |
            "heuristic") and extraction.confidence ("high" | "medium" | "low")
            and extraction.archetype ("article-blog" | "docs" | "news")
          - Export a `composeOutputSchema(fields: string[])` function that
            returns a Zod schema including only the requested field groups
            (per the `--fields` additive opt-in from §4.2)
          - Export a JSON Schema document derived from ExtractOutputSchema via
            zod-to-json-schema for schema introspection
          - Include schema_version "1.0.0" as a literal in _meta

          Acceptance:
          - Unit tests in src/schema/output.test.ts cover:
            - Minimal default output validates
            - Every field group can be added via composeOutputSchema
            - `composeOutputSchema(['all'])` includes every group
            - schema_version is always "1.0.0"
            - Invalid confidence/strategy/archetype values are rejected
          - `pnpm test src/schema/output.test.ts` passes
          - `pnpm check` passes

    # =========================================================================
    # Phase 2 — Security layer
    # =========================================================================

    - title: "URL validation"
      completed: false
      description: |
          Create src/security/url.ts implementing all URL validation rules.

          Read: DESIGN.md §9.1 (URL validation), §10.2 (INVALID_URL,
          INVALID_SCHEME, PRIVATE_NETWORK_BLOCKED error codes).

          Requirements:
          - Export `validateUrl(raw: string, opts?: { allowPrivateNetwork?: boolean })`
            returning a parsed URL or throwing a typed DistillError from
            src/schema/errors.ts
          - Implement every rule from §9.1: strict parse, http/https only,
            control-char rejection (ASCII < 0x20), private/loopback rejection
            (when not allowed), 2048-char limit
          - Check literal IP addresses in the hostname for private/loopback
            ranges (10/8, 172.16/12, 192.168/16, 127/8, ::1, fc00::/7, etc.).
            Do NOT perform DNS lookups in the validator — runtime DNS
            resolution is the fetch layer's concern
          - Use Node's built-in URL class, not a third-party parser

          Acceptance:
          - Unit tests in src/security/url.test.ts cover:
            - Valid http:// and https:// URLs pass
            - Malformed URLs throw INVALID_URL
            - file://, javascript:, data:, ftp:// URLs throw INVALID_SCHEME
            - URLs over 2048 chars throw INVALID_URL
            - URLs containing control chars throw INVALID_URL
            - Private IPs (127.0.0.1, 10.x.x.x, 192.168.x.x) throw
              PRIVATE_NETWORK_BLOCKED by default
            - Private IPs pass when allowPrivateNetwork is true
            - IPv6 loopback (::1) is rejected
          - `pnpm test src/security/url.test.ts` passes
          - `pnpm check` passes

    - title: "Path validation"
      completed: false
      description: |
          Create src/security/path.ts implementing path validation for
          --download-images and other path inputs.

          Read: DESIGN.md §9.2 (Path validation), §10.2 (INVALID_PATH).

          Requirements:
          - Export `validateOutputPath(raw: string)` returning a canonicalized
            absolute path or throwing DistillError with code INVALID_PATH
          - Implement every rule from §9.2: canonicalize (use
            node:path.resolve), reject `..` escapes from the intended base,
            reject absolute paths pointing into /etc, /proc, /sys, /dev, and
            other sensitive locations
          - Export `ensureSafeDir(path: string)` that creates the directory
            with safe permissions (0755, not world-writable) if it doesn't
            exist
          - Use node:path and node:fs/promises, no third-party path libraries

          Acceptance:
          - Unit tests in src/security/path.test.ts cover:
            - Valid relative paths resolve correctly
            - Valid absolute paths in user home resolve correctly
            - Paths containing `..` that escape cwd throw INVALID_PATH
            - Paths pointing into /etc, /proc, /sys, /dev throw INVALID_PATH
            - ensureSafeDir creates a missing directory
            - ensureSafeDir is a no-op if directory exists
          - `pnpm test src/security/path.test.ts` passes
          - `pnpm check` passes

    - title: "Cookies file permission check and header redaction"
      completed: false
      description: |
          Create src/security/cookies.ts for cookies-file validation and
          header redaction.

          Read: DESIGN.md §9.3 (Cookies file), §10.2 (INVALID_COOKIES_FILE).

          Requirements:
          - Export `loadCookiesFile(path: string)` that:
            - fstats the file, rejects if mode is broader than 0600 on Unix
              with INVALID_COOKIES_FILE (hint: "chmod 600 <file>")
            - parses the Netscape cookie jar format
            - returns an array of Cookie objects ({ domain, path, name, value,
              expires?, secure?, httpOnly? })
          - Export `redactHeaders(headers: Record<string, string>)` that
            returns a copy with any header matching
            /^(cookie|authorization|x-api-key|x-auth)/i replaced with
            "<redacted>"
          - Export `redactForErrors(received: unknown)` that recursively
            redacts the same header patterns in any nested object
          - On Windows (process.platform === 'win32'), skip the file mode check
            with a warning (Windows ACLs differ from Unix modes)

          Acceptance:
          - Unit tests in src/security/cookies.test.ts cover:
            - Cookie file with mode 0600 loads successfully
            - Cookie file with mode 0644 throws INVALID_COOKIES_FILE
            - Malformed cookie jar throws INVALID_COOKIES_FILE
            - redactHeaders replaces Cookie, Authorization, X-API-Key,
              X-Auth-Token values
            - redactHeaders preserves other headers verbatim
            - Tests create temp files with chmod to verify mode enforcement
          - `pnpm test src/security/cookies.test.ts` passes
          - `pnpm check` passes

    # =========================================================================
    # Phase 3 — Fetch and cache layer
    # =========================================================================

    - title: "Raw HTTP fetch with retries"
      completed: false
      description: |
          Create src/extractor/fetch.ts implementing the raw HTTP fetch layer
          without cache integration yet.

          Read: DESIGN.md §2 (Rendering strategy), §10.2 (network/auth error
          codes).

          Requirements:
          - Export `fetchRaw(url, opts)` where opts includes headers, cookies,
            userAgent, timeout, maxSize, retries
          - Use Node's built-in fetch (global), not axios or got
          - Follow redirects (up to 20 hops), reporting the final_url
          - Handle gzip/brotli transparently (native fetch does this)
          - Default realistic User-Agent string (recent Chrome) unless
            overridden
          - Retry on 429/503, respecting the Retry-After header (cap at 30s
            between retries, cap total retries at opts.retries default 2)
          - Max response body size enforced via reading the body in chunks
            and throwing TOO_LARGE if exceeded
          - Timeout enforced via AbortController
          - Map network errors to DistillError codes: DNS failure →
            DNS_FAILURE, ECONNREFUSED → CONNECTION_REFUSED, AbortError →
            TIMEOUT, 4xx → HTTP_4XX, 5xx → HTTP_5XX, TLS errors → TLS_ERROR
          - Detect bot-block heuristics (403/429 with cf-ray header, or
            common bot-block body patterns) and map to BOT_BLOCKED with
            retry_with suggestions ["--render", "--cookies", "--user-agent"]
          - Return { finalUrl, status, headers, body (Buffer), contentType }

          Do NOT integrate caching in this task — that is the next task.

          Acceptance:
          - Unit tests in src/extractor/fetch.test.ts using a local
            node:http server serving fixtures cover:
            - 200 OK returns body and headers
            - 404 throws HTTP_4XX
            - 503 retried then eventually throws HTTP_5XX
            - 429 with Retry-After respected
            - AbortController timeout throws TIMEOUT
            - Max size exceeded throws TOO_LARGE
            - Redirects followed, final_url set correctly
            - 403 with cf-ray header throws BOT_BLOCKED with retry_with
          - `pnpm test src/extractor/fetch.test.ts` passes
          - `pnpm check` passes

    - title: "SQLite cache layer"
      completed: false
      description: |
          Create src/cache/sqlite.ts implementing the HTTP response cache.

          Read: DESIGN.md §8 (Caching).

          Requirements:
          - Use node:sqlite (built-in). Import as `import sqlite from
            'node:sqlite'`. Do NOT use better-sqlite3 or any other driver.
          - Enable WAL mode for concurrent writers via
            `db.exec('PRAGMA journal_mode=WAL')`
          - Schema: cache(key TEXT PRIMARY KEY, status INT, headers TEXT,
            body BLOB, fetched_at INT, expires_at INT, content_type TEXT)
          - Key function: `cacheKey(url, normalizedHeaders, hasAuth)` —
            hash of (url + normalized header subset). If hasAuth is true, the
            key function may be irrelevant (see next task's auth-bypass rule)
          - Export: `get(key)`, `set(key, entry, ttl)`, `delete(pattern)`,
            `list(filter)`, `clear(opts)`, `migrate()` (creates schema)
          - Cache directory resolution: XDG_CACHE_HOME/distill/http-cache.sqlite
            on Linux, ~/Library/Caches/distill/http-cache.sqlite on macOS, use
            the standard node pattern for XDG_CACHE_HOME detection
          - TTL default 1 hour. Respect shorter Cache-Control max-age if
            present in the stored headers
          - The cache module itself does NOT enforce the "never cache auth
            responses" rule — that happens at the fetch integration layer
            (next task)

          Acceptance:
          - Unit tests in src/cache/sqlite.test.ts use a temp dir for the
            database file, cover:
            - migrate() creates the schema
            - set/get round-trip
            - Expired entries not returned by get()
            - delete(pattern) removes matching keys
            - list() returns summary of entries
            - clear({olderThan}) prunes old entries
            - Two concurrent writers via two Database instances don't corrupt
              (WAL mode test)
          - `pnpm test src/cache/sqlite.test.ts` passes
          - `pnpm check` passes

    - title: "Cache integration into fetch + auth-bypass invariant"
      completed: false
      description: |
          Integrate the SQLite cache into the fetch layer with the critical
          "never cache authenticated responses" invariant.

          Read: DESIGN.md §8 (Caching) — specifically the "Rule" paragraph
          about cookies and Authorization headers.

          Requirements:
          - Create src/extractor/cached-fetch.ts that wraps fetchRaw with
            cache logic
          - Export `cachedFetch(url, opts)` with signature matching fetchRaw
            plus opts: { noCache?, refresh?, maxAge? }
          - Flow:
            1. If opts.cookies is set OR opts.headers contains an
               Authorization header (case-insensitive), BYPASS the cache
               entirely — do not read from it, do not write to it. Proceed
               directly to fetchRaw.
            2. Otherwise, compute cache key, check cache, return cached entry
               if present and not expired (respecting opts.maxAge override and
               opts.noCache read-bypass)
            3. On miss or refresh, call fetchRaw, store result, return it
          - The auth-bypass rule MUST have a dedicated unit test that fails
            loudly if broken. Explicitly named e.g.
            "never caches authenticated responses"
          - _meta.from_cache field returned with each call (boolean)

          Acceptance:
          - Unit tests in src/extractor/cached-fetch.test.ts use a temp SQLite
            DB + a local http test server, covering:
            - Cache miss → fetch → cache hit on second call
            - Cookies present → never reads from cache, never writes to cache
              (the invariant test)
            - Authorization header present → never reads from cache, never
              writes to cache
            - --no-cache bypasses read but still writes
            - --refresh forces fetch and updates cache
            - Expired entries trigger refetch
            - Cache-Control: max-age=60 shortens TTL below default
          - `pnpm test src/extractor/cached-fetch.test.ts` passes
          - `pnpm check` passes

    # =========================================================================
    # Phase 4 — Extraction core
    # =========================================================================

    - title: "Block-based DOM representation"
      completed: false
      description: |
          Create src/extractor/blocks.ts implementing the block-based DOM
          representation that is the internal canonical form.

          Read: DESIGN.md §4.3 (Block-based internal representation), §6
          (Extraction strategy — the overall context).

          Requirements:
          - Use linkedom (already installed) for HTML parsing. Import via
            `import { parseHTML } from 'linkedom'`. Do NOT use jsdom, cheerio,
            or any other parser.
          - Define a `Block` type with fields:
            - id: string (stable across runs)
            - text: string
            - tagPath: string[] (e.g., ["html", "body", "main", "article",
              "p"])
            - headingLevel: number | null (1-6 for h1-h6, null otherwise)
            - linkDensity: number (0-1, links text length / total text length)
            - wordCount: number
            - imageRefs: { alt: string, src: string }[]
            - visibility: "visible" | "hidden" (based on style/hidden attr)
            - childBlockIds: string[]
          - Export `domToBlocks(html: string)` that parses HTML via linkedom
            and returns an ordered array of Block objects representing the
            content structure
          - The block extraction traverses the DOM in document order. Text
            nodes are aggregated into the enclosing block-level element.
            Inline elements (span, a, em, strong, etc.) contribute to the
            parent block's text but do not create new blocks.
          - Block-level elements that DO create new blocks: p, h1-h6, li, pre,
            blockquote, table, td, th, figure, article, section, div (only if
            it contains direct text), main, header, footer, aside, nav
          - Images found inside a block are recorded in that block's imageRefs

          Acceptance:
          - Unit tests in src/extractor/blocks.test.ts cover:
            - Simple <article><h1>T</h1><p>body</p></article> produces two
              blocks with correct headingLevel and tagPath
            - Nested lists produce correct parent/child relationships
            - Links contribute to linkDensity correctly
            - Hidden elements (style="display:none" or hidden attr) are
              marked visibility: "hidden"
            - Image references are captured in imageRefs
            - Inline elements don't create separate blocks
          - `pnpm test src/extractor/blocks.test.ts` passes
          - `pnpm check` passes

    - title: "Chrome stripping pre-processor"
      completed: false
      description: |
          Create src/extractor/strip-chrome.ts that removes navigation,
          headers, footers, asides, scripts, styles, and common boilerplate
          from a DOM tree before block extraction.

          Read: DESIGN.md §6 step 5 (always strip obvious chrome first).

          Requirements:
          - Export `stripChrome(document: Document)` that mutates the document
            in place, removing:
            - <script>, <style>, <noscript>
            - <nav>, <header> (but only if it's a site header, not an article
              header — see note below), <footer>, <aside>
            - Elements with role="navigation", role="banner",
              role="contentinfo", role="complementary"
            - Cookie consent banners: elements with id or class matching
              /cookie|consent|gdpr|ccpa/i that are positioned near the top of
              the body
            - Social share widgets: elements with class matching
              /share|social|tweet|facebook|linkedin/i that contain only links
            - Advertising: elements with class/id matching /\bads?\b|sponsor/i
          - Caution on <header>: do not strip <header> elements that are
            descendants of <article> or <section> with role="article", since
            those contain article metadata. Strip only body-level headers.
          - Caution on <aside>: do not strip <aside> if the page is classified
            as "docs" (docs sidebars are often navigation but can contain
            content). For this task, strip aggressively and let the archetype
            classifier task override this later if needed.
          - Return stripping metadata: { stripped: { nav: number, header: number,
            footer: number, aside: number, scripts: number, styles: number,
            ads: number, cookie_banners: number, social_widgets: number } }
            so the extraction trace can report what was removed

          Acceptance:
          - Unit tests in src/extractor/strip-chrome.test.ts cover:
            - <nav> elements are removed
            - body-level <header> is removed
            - <article><header>...</header></article> is preserved
            - <script> and <style> are removed
            - Cookie banner divs are removed
            - Social share widgets are removed
            - Ad containers are removed
            - Stripping metadata counts are accurate
          - `pnpm test src/extractor/strip-chrome.test.ts` passes
          - `pnpm check` passes

    - title: "Selector-chain extraction strategy"
      completed: false
      description: |
          Create src/extractor/strategies/selector-chain.ts implementing the
          fixed selector chain strategy.

          Read: DESIGN.md §6 steps 1-3 (selector chain), §6.1 (confidence
          rubric).

          Requirements:
          - Export `extractWithSelectorChain(document: Document)` returning
            { strategy: "selector", selector: string, blocks: Block[] } on
            success, or null if no selector in the chain matched
          - The chain order: `main` → `article` → `[role="main"]` →
            `#content` → `.post-content` → `.entry-content`
          - For each selector, if it matches, extract blocks from that subtree
            using the blocks module and return immediately
          - If --selector is passed explicitly, use it and label strategy as
            "explicit" (this path is separately handled in the command layer;
            this module only handles the chain)
          - Does NOT apply chrome stripping — that is a separate step that
            runs before this strategy

          Acceptance:
          - Unit tests in src/extractor/strategies/selector-chain.test.ts
            cover:
            - <main> in document → extracts from main
            - No <main> but <article> → extracts from article
            - No main or article, has [role="main"] → extracts from that
            - None of the selectors match → returns null
            - Multiple <article> elements: extracts from the first
          - `pnpm test src/extractor/strategies/selector-chain.test.ts` passes
          - `pnpm check` passes

    - title: "Heuristic fallback extraction strategy"
      completed: false
      description: |
          Create src/extractor/strategies/heuristic.ts implementing the
          Readability-style scoring fallback.

          Read: DESIGN.md §6 step 4 (heuristic fallback).

          Requirements:
          - Export `extractWithHeuristic(document: Document)` returning
            { strategy: "heuristic", selector: null, blocks: Block[] } or
            throwing ALL_STRATEGIES_FAILED if no plausible content found
          - Algorithm: score each candidate root (body's direct children)
            by:
            - Total text length (positive weight)
            - Paragraph count (positive)
            - Heading count (positive)
            - Link density (negative — boilerplate is link-heavy)
            - Text-to-HTML ratio (positive)
          - Pick the highest-scoring subtree
          - Extract blocks from the selected subtree
          - If top score is below a minimum threshold, throw
            ALL_STRATEGIES_FAILED with hint about the page being mostly
            boilerplate
          - This is a BASIC scoring pass, not a full Readability implementation.
            Document that it's intentionally naive and can be improved later.

          Acceptance:
          - Unit tests in src/extractor/strategies/heuristic.test.ts cover:
            - A page with one content-dense div and several nav-heavy divs
              selects the content div
            - A page with no content-bearing elements throws
              ALL_STRATEGIES_FAILED
            - Link density correctly penalizes link lists
            - Heading presence boosts the score
          - `pnpm test src/extractor/strategies/heuristic.test.ts` passes
          - `pnpm check` passes

    - title: "Quality scoring and confidence rubric"
      completed: false
      description: |
          Create src/extractor/confidence.ts implementing the confidence
          classification.

          Read: DESIGN.md §4.1 (extraction.confidence is an enum),
          §6.1 (confidence rubric).

          Requirements:
          - Export `computeConfidence(strategy, blocks, context)` returning
            "high" | "medium" | "low" per the rubric in §6.1
          - High: explicit selector OR selector chain with strong quality
            (word count > 500, link density < 0.3)
          - Medium: selector chain with moderate quality
          - Low: heuristic fallback OR marginal quality metrics
          - Do NOT return a numeric score. Confidence is strictly the enum.
          - Export `computeMetrics(blocks)` returning { text_length,
            text_html_ratio, paragraphs, link_density } for the optional
            --fields +extraction.metrics group (these are the raw observables,
            separate from confidence)

          Acceptance:
          - Unit tests in src/extractor/confidence.test.ts cover:
            - explicit strategy always → high
            - selector strategy with 1000 words, low links → high
            - selector strategy with 300 words → medium
            - heuristic strategy → low
            - computeMetrics returns correct counts for known block arrays
          - `pnpm test src/extractor/confidence.test.ts` passes
          - `pnpm check` passes

    - title: "Page archetype classifier"
      completed: false
      description: |
          Create src/extractor/archetype.ts implementing the basic page
