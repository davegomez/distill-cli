          - Imports the harness functions from test/eval.ts
          - Runs them against the corpus
          - Fails the test if any fixture fails any exact check
          - This is the test that catches unintended regressions when the
            extractor is modified
          - Gracefully handle zero fixtures (test passes with a skip message)

          Acceptance:
          - `pnpm eval` runs without errors against the existing 10 fixtures
          - `pnpm test test/eval.spec.ts` passes (OR fails loudly with a
