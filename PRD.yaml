            3. Create a new context, navigate to url, wait for network idle
               (with a 30s timeout)
            4. Apply cookies and custom headers from opts (via context.setCookies
               and context.setExtraHTTPHeaders)
            5. Use a realistic User-Agent from opts or the default
            6. Get page.content() as the HTML
            7. Close the context and browser
          - Always close the browser even on error (try/finally)
          - On root + Linux, automatically add --no-sandbox to launch args
            (detectable via process.getuid() === 0 on Linux)

          Acceptance:
          - Unit test (gated behind DISTILL_E2E=1 env var since it requires
            the browser): launches chromium against a local http server
            fixture and returns rendered HTML
          - Unit test (always runs): mocks playwright.chromium.launch to throw
